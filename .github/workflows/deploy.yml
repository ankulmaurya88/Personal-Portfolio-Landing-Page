name: CI/CD Pipeline to Docker Hub & Render

on:
  push:
    branches:
      - main  # Trigger pipeline when code is pushed to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the source code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log in to your personal Docker Hub account
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build and push the image to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'your-dockerhub-username' with your real username
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-site:latest

      # 4. Trigger Render to pull the new image and deploy
      - name: Trigger Deploy on Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
